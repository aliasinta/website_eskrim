  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .app{
      width:360px;
      height:740px;
      background:white;
      padding:20px;
      position:relative;
      overflow:hidden;
    }

    /* HEADER */
    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:20px;
    }

    .menu{
      width:45px;
      height:45px;
      border-radius:50%;
      background:#ffb6d5;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-size:20px;
    }

    .cart{
      color:#ff7ca8;
      font-size:25px;
      margin-top:5px;
    }

    .title{
      color:#e63946;
      font-size:20px;
      font-weight:bold;
      line-height:1.2;
    }

    /* SEARCH */
    .search-box{
      width:100%;
      height:45px;
      background:#f7c8e3;
      border-radius:10px;
      display:flex;
      align-items:center;
      overflow:hidden;
      margin-bottom:30px;
    }

    .search-box i{
      padding:0 15px;
      color:black;
    }

    .search-box input{
      flex:1;
      border:none;
      background:transparent;
      outline:none;
      font-size:14px;
    }

    .search-btn{
      width:60px;
      height:100%;
      background:#ef233c;
    }

    /* CATEGORY */
    .category{
      display:flex;
      justify-content:space-between;
      margin-bottom:25px;
    }

    .category img{
      width:55px;
      height:55px;
      object-fit:contain;
    }

    /* TEXT */
    .section-title{
      color:#e63946;
      font-size:20px;
      font-weight:bold;
      margin-bottom:15px;
    }

    /* CARD */
    .card{
      width:230px;
      height:330px;
      background:#e63950;
      border-radius:18px;
      margin:auto;
      position:relative;
      padding:20px;
    
    }

    .ice-img{
      width:220px;
      position:absolute;
      top:-80px;
      left:50%;
      transform:translateX(-50%);
    }

    .straw1{
      width:55px;
      position:absolute;
      left:20px;
      top:55px;
    }

    .straw2{
      width:55px;
      position:absolute;
      right:20px;
      top:55px;
    }

    .card-content{
      margin-top:140px;
      color:white;
    }

    .card-content h2{
      font-size:28px;
      margin-bottom:15px;
    }

    .stars{
      margin-top:10px;
      color:#ffd6e0;
      font-size:20px;
      letter-spacing:5px;
    }

    /* PLUS BUTTON */
    .plus-btn{
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: white;

    display: flex;
    justify-content: center;
    align-items: center;

    text-decoration: none;
    font-size: 40px;
    color: pink;

    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

    /* BOTTOM NAV */
    .bottom-nav{
      width:100%;
      position:absolute;
      bottom:15px;
      left:0;
      display:flex;
      justify-content:space-around;
      color:#f7a9c4;
      font-size:25px;
    }
  </style>
</head>
