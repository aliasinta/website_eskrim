<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ice Cream App</title>

  <!-- ICON -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .app{
      width:360px;
      height:740px;
      background:white;
      padding:20px;
      position:relative;
      overflow:hidden;
    }

    /* HEADER */
    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:20px;
    }

    .menu{
      width:45px;
      height:45px;
      border-radius:50%;
      background:#ffb6d5;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-size:20px;
    }

    .cart{
      color:#ff7ca8;
      font-size:25px;
      margin-top:5px;
    }

    .title{
      color:#e63946;
      font-size:20px;
      font-weight:bold;
      line-height:1.2;
    }

    /* SEARCH */
    .search-box{
      width:100%;
      height:45px;
      background:#f7c8e3;
      border-radius:10px;
      display:flex;
      align-items:center;
      overflow:hidden;
      margin-bottom:30px;
    }

    .search-box i{
      padding:0 15px;
      color:black;
    }

    .search-box input{
      flex:1;
      border:none;
      background:transparent;
      outline:none;
      font-size:14px;
    }

    .search-btn{
      width:60px;
      height:100%;
      background:#ef233c;
    }

    /* CATEGORY */
    .category{
      display:flex;
      justify-content:space-between;
      margin-bottom:25px;
    }

    .category img{
      width:55px;
      height:55px;
      object-fit:contain;
    }

    /* TEXT */
    .section-title{
      color:#e63946;
      font-size:20px;
      font-weight:bold;
      margin-bottom:15px;
    }

    /* CARD */
    .card{
      width:230px;
      height:330px;
      background:#e63950;
      border-radius:18px;
      margin-bottom: -80;
      position:relative;
      padding:20px;
    
    }

    .ice-img{
      width:220px;
      position:absolute;
      top:-80px;
      left:50%;
      transform:translateX(-50%);
    }

    .straw1{
      width:55px;
      position:absolute;
      left:20px;
      top:55px;
    }

    .straw2{
      width:55px;
      position:absolute;
      right:20px;
      top:55px;
    }

    .card-content{
      margin-top:140px;
      color:white;
    }

    .card-content h2{
      font-size:28px;
      margin-bottom:15px;
    }

    .stars{
      margin-top:10px;
      color:#ffd6e0;
      font-size:20px;
      letter-spacing:5px;
    }

    /* PLUS BUTTON */
    .plus-btn{
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: white;

    display: flex;
    justify-content: center;
    align-items: center;

    text-decoration: none;
    font-size: 40px;
    color: pink;

    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

    /* BOTTOM NAV */
    .bottom-nav{
      width:100%;
      position:absolute;
      bottom:15px;
      left:0;
      display:flex;
      justify-content:space-around;
      color:#f7a9c4;
      font-size:25px;
    }
  </style>
</head>
<body>
    <!-- SEARCH -->
<style>

.category img{
    width:100px;
    height:100px;
}

</style>
    <!-- NAVIGASI UTAS: MENU, JUDUL, KERANJANG -->
<div style="display: flex; justify-content: space-between; align-items: center; width: 350px; margin: 20px auto 10px auto; padding: 0 10px;">
    <!-- Tombol Menu Garis Tiga -->
    <div class="menu-icon" onclick="toggleMenu()" style="cursor: pointer; background: #EFA7B3; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">
        <i class="fa-solid fa-bars" style="font-size: 18px;"></i>
    </div>

    <!-- Judul Tengah -->
    <h2 style="color: #BC2B3D; font-size: 20px; font-weight: bold; text-align: center; margin: 0; line-height: 1.2;">
        Temukan rasa<br>Kesukaan mu
    </h2>

    <!-- Keranjang Belanja -->
    <div class="cart-container" style="position: relative; cursor: pointer; color: #BC2B3D; background: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <i class="fa-solid fa-cart-shopping" style="font-size: 20px;"></i> 
        <span id="cartCount" style="position: absolute; top: -5px; right: -5px; background: #BC2B3D; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; display: none;">0</span>
    </div>
</div>

<!-- KOTAK PENCARIAN -->
<div class="search-box" style="display: flex; width: 330px; margin: 15px auto 25px auto; background: #F3D5DE; border-radius: 15px; overflow: hidden; align-items: center; padding-left: 15px; height: 50px;">
    <i class="fa-solid fa-magnifying-glass" style="color: #BC2B3D; font-size: 16px;"></i>
    <input type="text" placeholder="Cari pilihan rasa es krim" style="flex: 1; border: none; background: transparent; outline: none; padding: 10px; font-size: 14px; color: #BC2B3D;">
    <div class="search-btn" style="background: #BC2B3D; width: 55px; height: 100%;"></div>
</div>
</div>

    <!-- CATEGORY -->
    <div class="category">
      <img src="cones.png">
      <img src="candy.png">
      <img src="cups.png">
      <img src="cones.png">
    </div>

    <!-- TITLE -->
    <div class="section-title">
      Laris Manis
    </div>

    <!-- CARD -->
    <div class="card">

      <img class="ice-img" src="bg cream.png">


      <div class="card-content">
        <h2>Stroberi</h2>

        <div class="stars">
          ★ ★ ★ ★ ★
        </div>
      </div>

      <a href="detail.html" class="plus-btn">+</a>
      </div>
    </div>

    

</body>
</html>
